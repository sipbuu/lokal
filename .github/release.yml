changelog:
  categories:
    - title: "### New Features"
      labels: ["feature", "enhancement"]
    - title: "### Critical Fixes"
      labels: ["bug", "fix"]
    - title: "### Small Updates"
      labels: ["documentation", "chore"]
    - title: "### Dependencies"
      labels: ["dependencies"]
  exclude:
    labels:
      - skip-changelog
    authors:
      - octocat

render-anonymous-commits: true