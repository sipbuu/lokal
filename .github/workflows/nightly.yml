name: Nightly Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      new_commits: ${{ steps.check_commits.outputs.new_commits }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits since last nightly
        id: check_commits
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "new_commits=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if git rev-parse --verify refs/tags/nightly >/dev/null 2>&1; then
            COUNT=$(git rev-list --count nightly..HEAD)
          else
            COUNT=1
          fi

          if [ "$COUNT" -gt 0 ]; then
            echo "new_commits=true" >> $GITHUB_OUTPUT
          else
            echo "new_commits=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.new_commits == 'true'
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        env:
          ELECTRON_DOWNLOAD_TIMEOUT: 120000
        run: npm ci

      - name: Build Application
        run: npm run build -- --publish never

      - name: Rename and Prefix Release Files
        shell: bash
        run: |
          if [ -d "release" ]; then
            cd release
            find . -maxdepth 1 -type f | while read -r f; do
              clean_name="${f// /-}"
              base="${clean_name%.*}"
              ext="${clean_name##*.}"
              mv "$f" "${base}-${{ matrix.os }}.${ext}"
            done
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.os }}
          path: release

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Aggregate artifacts into release_all
        shell: bash
        run: |
          mkdir -p release_all
          if [ -d "artifacts" ]; then
            echo "Copying artifacts..."
            find artifacts -type f -exec cp -v {} release_all/ \;
          fi
          
          if [ -z "$(ls -A release_all 2>/dev/null)" ]; then
            echo "No files found, creating placeholder."
            touch release_all/.no_files
          fi

      - name: Generate checksums
        id: checksums
        shell: bash
        run: |
          shopt -s nullglob
          echo "HASHES<<EOF" >> $GITHUB_OUTPUT
          if [ -d "release_all" ]; then
            cd release_all
            for f in *; do
              if [ -f "$f" ] && [ "$f" != ".no_files" ]; then
                HASH=$(sha256sum "$f" | awk '{print toupper($1)}')
                echo "> **$f**: \`[$HASH]\`" >> $GITHUB_OUTPUT
              fi
            done
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get latest commit message
        id: latest_commit
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "LATEST=$MSG" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const response = await github.rest.repos.generateReleaseNotes({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: 'nightly',
                target_commitish: context.sha
              });
              core.setOutput('body', response.data.body);
            } catch (e) {
              core.setOutput('body', 'Incremental changelog not available for this build.');
            }

      - name: Create/Update GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lokal (Nightly)"
          tag_name: nightly
          prerelease: true
          make_latest: false
          files: release_all/**/*
          body: |
            ![nightly moon](https://i.imgur.com/2M91R9E.png)

            # Lokal (Nightly)

            **Built from latest commit:** ${{ steps.latest_commit.outputs.LATEST }}

            ---

            ## Changelog
            ${{ steps.release_notes.outputs.body }}

            ---

            ### Binary Checksums (SHA-256)
            ${{ steps.checksums.outputs.HASHES }}

      - name: Discord Notification
        if: env.DISCORD_WEBHOOK != ''
        shell: bash
        run: |
          PAYLOAD=$(jq -n --arg msg "${{ steps.latest_commit.outputs.LATEST }}" \
            --arg url "${{ steps.create_release.outputs.html_url }}" \
            '{embeds: [{title: "Nightly build updated", description: $msg, url: $url, color: 3447003}]}')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"