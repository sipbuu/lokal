name: Notify Published Release

on:
  release:
    types: [published, released]
  workflow_dispatch: 

jobs:
  discord-announcement:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Event Data
        run: |
          echo "Event Type: ${{ github.event_name }}"
          echo "Release Tag: ${{ github.event.release.tag_name }}"

      - name: Discord Notification
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ -z "${{ github.event.release.tag_name }}" ]; then
            RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/releases/latest)
            TAG=$(echo "$RELEASE_DATA" | jq -r .tag_name)
            NAME=$(echo "$RELEASE_DATA" | jq -r .name)
            URL=$(echo "$RELEASE_DATA" | jq -r .html_url)
          else
            TAG="${{ github.event.release.tag_name }}"
            NAME="${{ github.event.release.name }}"
            URL="${{ github.event.release.html_url }}"
          fi
          if [ "$NAME" == "null" ] || [ -z "$NAME" ]; then NAME="Release $TAG"; fi

          PAYLOAD=$(jq -n \
            --arg tag "$TAG" \
            --arg name "$NAME" \
            --arg url "$URL" \
            --arg image "https://i.imgur.com/KgjwTvk.png" \
            --arg footer_icon "https://i.imgur.com/ZC3mEUC.png" \
            --argjson color 3066993 \
            '{
              content: "**A new Lokal update is now available!**",
              embeds: [{
                title: "Lokal \($tag) is here!",
                description: "The latest version of Lokal is now available for download!\n\n**What’s New:**\n\($name)\n\nGrab the update from GitHub below.",
                url: $url,
                color: $color,
                image: { url: $image },
                footer: { text: "Lokal - Local-first Music Player", icon_url: $footer_icon }
              }]
            }'
          )

          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"