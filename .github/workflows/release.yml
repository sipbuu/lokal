name: Release Lokal

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build -- --publish never

      - name: Rename release files for this runner
        shell: bash
        run: |
          # rename spaces to dashes in release dir if present
          cd release 2>/dev/null || exit 0
          for f in *\ *; do
            [ -f "$f" ] && mv "$f" "${f// /-}"
          done

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Aggregate artifacts into release_all
        shell: bash
        run: |
          mkdir -p release_all
          # Copy all files from all artifacts (artifact dirs inside artifacts/*)
          shopt -s nullglob
          for d in artifacts/*; do
            if [ -d "$d" ]; then
              cp -R "$d"/* release_all/ || true
            fi
          done
          # If release_all is empty, create a placeholder so release creation doesn't fail
          if [ -z "$(ls -A release_all 2>/dev/null)" ]; then
            mkdir -p release_all
            touch release_all/.no_files
          fi

      - name: Generate checksums for all artifacts
        id: checksums
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            SHACMD='sha256sum'
          else
            SHACMD='shasum -a 256'
          fi

          echo "HASHES<<EOF" >> $GITHUB_OUTPUT
          for f in release_all/*; do
            if [ -f "$f" ] && [ "$(basename "$f")" != ".no_files" ]; then
              HASH=$($SHACMD "$f" | awk '{print toupper($1)}')
              NAME=$(basename "$f")
              echo "> **$NAME**: \`[$HASH]\`" >> $GITHUB_OUTPUT
            fi
          done
          if [ -z "$(ls -A release_all 2>/dev/null | grep -v .no_files)" ]; then
            echo "No release files found" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get latest commit message (single)
        id: latest_commit
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "LATEST<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.payload.ref.replace('refs/tags/', ''),
            });
            core.setOutput('body', response.data.body);

      - name: Create GitHub Release (single aggregated)
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: |
            release_all/**/*
          draft: true
          body: |
            ![ghost](https://i.imgur.com/ZC3mEUC.png) ![ghost](https://i.imgur.com/ZC3mEUC.png) ![ghost](https://i.imgur.com/ZC3mEUC.png)

            # Lokal ${{ github.ref_name }}

            ${{ steps.latest_commit.outputs.LATEST }}

            ---

            ## Changelog

            FYI:
            **Lokal is 100% local; the library, history, anything in database, or any info that is used for API's such as yt-dlp, LRCLIB, is *NOT* seen by us.**

            ${{ steps.release_notes.outputs.body }}

            ---

            ## Setup

            See [README.md](./README.md) for full setup instructions.

            ---

            ### Binary Checksums (SHA-256)

            ${{ steps.checksums.outputs.HASHES }}

      - name: Discord Notification (Build Complete)
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          LATEST_MSG=${{ steps.latest_commit.outputs.LATEST }}

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            PLATFORM="Windows"
            COLOR=3447003
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            PLATFORM="macOS"
            COLOR=16777215
          else
            PLATFORM="Linux"
            COLOR=15822353
          fi

          PAYLOAD=$(jq -n \
            --arg version "${{ github.ref_name }}" \
            --arg platform "$PLATFORM" \
            --arg url "${{ steps.create_release.outputs.html_url }}" \
            --arg msg "$LATEST_MSG" \
            --arg image "https://i.imgur.com/KgjwTvk.png" \
            --arg footer_icon "https://i.imgur.com/ZC3mEUC.png" \
            --argjson color $COLOR \
            '{
              embeds: [{
                title: "Build Complete: Lokal \($version) (\($platform))",
                description: "The binaries for version **\($version)** have been built and uploaded to the release draft.\n\n**Platform:** \($platform)\n**Status:** Draft Ready\n**Last Commit:** \($msg)",
                url: $url,
                color: $color,
                image: { url: $image },
                footer: { text: "Lokal Build System", icon_url: $footer_icon }
              }]
            }'
          )

          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"