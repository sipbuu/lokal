name: Release Lokal

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build -- --publish never

      - name: Get Latest Commit Message
        id: commit_msg
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s")
          else
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s")
          fi

          echo "MESSAGE<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Rename and Generate Checksums
        id: checksums
        shell: bash
        run: |
          cd release
          for f in *\ *; do
            [ -f "$f" ] && mv "$f" "${f// /-}"
          done
          echo "HASHES<<EOF" >> $GITHUB_OUTPUT
          for f in *.exe *.dmg *.zip *.AppImage *.deb; do
            if [ -f "$f" ]; then
              HASH=$(sha256sum "$f" | awk '{print toupper($1)}')
              echo "> **$f**: \`[$HASH]\`" >> $GITHUB_OUTPUT
            fi
          done
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.payload.ref.replace('refs/tags/', ''),
            });
            core.setOutput('body', response.data.body);

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/latest.yml
            release/latest-mac.yml
            release/latest-linux.yml
          draft: true
          body: |
            ![ghost](https://i.imgur.com/ZC3mEUC.png) ![ghost](https://i.imgur.com/ZC3mEUC.png) ![ghost](https://i.imgur.com/ZC3mEUC.png) 

            # Lokal ${{ github.ref_name }}
            
            ${{ steps.commit_msg.outputs.MESSAGE }}

            ---

            ## Changelog

            FYI:
            **Lokal is 100% local; the library, history, anything in database, or any info that is used for API's such as yt-dlp, LRCLIB, is *NOT* seen by us.**

            ${{ steps.release_notes.outputs.body }}

            ---

            ## Setup

            See [README.md](./README.md) for full setup instructions.

            ---

            ### Binary Checksums (SHA-256)

            ${{ steps.checksums.outputs.HASHES }}

      - name: Discord Notification (Build Complete)
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          SAFE_MSG=$(echo "${{ steps.commit_msg.outputs.MESSAGE }}" | jq -aRs .)

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            PLATFORM="Windows"
            COLOR=3447003
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            PLATFORM="macOS"
            COLOR=16777215
          else
            PLATFORM="Linux"
            COLOR=15822353
          fi

          PAYLOAD=$(jq -n \
            --arg version "${{ github.ref_name }}" \
            --arg platform "$PLATFORM" \
            --arg url "${{ steps.create_release.outputs.html_url }}" \
            --arg msg "${{ steps.commit_msg.outputs.MESSAGE }}" \
            --arg image "https://i.imgur.com/KgjwTvk.png" \
            --arg footer_icon "https://i.imgur.com/ZC3mEUC.png" \
            --argjson color $COLOR \
            '{
              embeds: [{
                title: "Build Complete: Lokal \($version) (\($platform))",
                description: "The binaries for version **\($version)** have been built and uploaded to the release draft.\n\n**Platform:** \($platform)\n**Status:** Draft Ready\n**Last Commit:** \($msg)",
                url: $url,
                color: $color,
                image: { url: $image },
                footer: { text: "Lokal Build System", icon_url: $footer_icon }
              }]
            }'
          )

          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"