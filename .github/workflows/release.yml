name: Release Lokal

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build -- --publish never

      - name: Get Latest Commit Message
        id: commit_msg
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "MESSAGE=$MSG" >> $GITHUB_OUTPUT

      - name: Rename and Generate Checksums
        id: checksums
        shell: bash
        run: |
          cd release
          for f in *\ *; do
            [ -f "$f" ] && mv "$f" "${f// /-}"
          done
          echo "HASHES<<EOF" >> $GITHUB_OUTPUT
          for f in *.exe *.dmg *.zip; do
            if [ -f "$f" ]; then
              HASH=$(sha256sum "$f" | awk '{print toupper($1)}')
              echo "> **$f**: \`[$HASH]\`" >> $GITHUB_OUTPUT
            fi
          done
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.payload.ref.replace('refs/tags/', ''),
            });
            core.setOutput('body', response.data.body);

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/latest.yml
            release/latest-mac.yml
          draft: true
          body: |
            ![ghost](https://i.imgur.com/ZC3mEUC.png) ![ghost](https://i.imgur.com/ZC3mEUC.png) ![ghost](https://i.imgur.com/ZC3mEUC.png) 

            # Lokal ${{ github.ref_name }}
            
            ${{ steps.commit_msg.outputs.MESSAGE }}

            ---

            ## Changelog

            FYI:
            **Lokal is 100% local; the library, history, anything in database, or any info that is used for API's such as yt-dlp, LRCLIB, is *NOT* seen by us.**

            ${{ steps.release_notes.outputs.body }}

            ---

            ## Setup

            See [README.md](./README.md) for full setup instructions.

            ---

            ### Binary Checksums (SHA-256)

            ${{ steps.checksums.outputs.HASHES }}

      - name: Discord Notification (Draft)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "Build Successful: Lokal ${{ github.ref_name }}",
              "description": "The binaries for version **${{ github.ref_name }}** have been built and uploaded as a **Draft**.\n\n**Status:** 🏗️ Waiting for manual review/publish.\n**Commit:** `${{ steps.commit_msg.outputs.MESSAGE }}`",
              "url": "${{ steps.create_release.outputs.html_url }}",
              "color": 8421504,
              "image": { "url": "https://i.imgur.com/KgjwTvk.png" },
              "footer": { "text": "Internal Dev Alert", "icon_url": "https://i.imgur.com/ZC3mEUC.png" }
            }]
          }' $DISCORD_WEBHOOK